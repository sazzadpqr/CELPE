openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admin
    description: Admin operations
  - name: content
    description: Public content for mobile app
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admin/auth:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Unauthorized

  /admin/auth/rotate:
    post:
      operationId: rotateAdminPassword
      tags: [admin]
      summary: Rotate admin password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotatePasswordBody"
      responses:
        "200":
          description: Password rotated, returns new token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get usage stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usage statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/logs:
    get:
      operationId: getAdminLogs
      tags: [admin]
      summary: Get recent request logs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RequestLog"

  /admin/prompts:
    get:
      operationId: listAdminPrompts
      tags: [admin]
      summary: List practice prompts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of prompts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PracticePrompt"
    post:
      operationId: createAdminPrompt
      tags: [admin]
      summary: Create a practice prompt
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PracticePromptBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticePrompt"

  /admin/prompts/{id}:
    put:
      operationId: updateAdminPrompt
      tags: [admin]
      summary: Update a practice prompt
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PracticePromptBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticePrompt"
    delete:
      operationId: deleteAdminPrompt
      tags: [admin]
      summary: Delete a practice prompt
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/grammar:
    get:
      operationId: listAdminGrammar
      tags: [admin]
      summary: List grammar topics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of grammar topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrammarTopic"
    post:
      operationId: createAdminGrammar
      tags: [admin]
      summary: Create a grammar topic
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrammarTopicBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrammarTopic"

  /admin/grammar/{id}:
    put:
      operationId: updateAdminGrammar
      tags: [admin]
      summary: Update a grammar topic
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrammarTopicBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrammarTopic"
    delete:
      operationId: deleteAdminGrammar
      tags: [admin]
      summary: Delete a grammar topic
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/security-events:
    get:
      operationId: listAdminSecurityEvents
      tags: [admin]
      summary: List security activity events
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Security events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecurityEvent"

  /admin/quiz/categories:
    get:
      operationId: listAdminQuizCategories
      tags: [admin]
      summary: List quiz categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of quiz categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizCategory"
    post:
      operationId: createAdminQuizCategory
      tags: [admin]
      summary: Create quiz category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizCategoryBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizCategory"

  /admin/quiz/categories/{id}:
    put:
      operationId: updateAdminQuizCategory
      tags: [admin]
      summary: Update quiz category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizCategoryBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizCategory"
    delete:
      operationId: deleteAdminQuizCategory
      tags: [admin]
      summary: Delete quiz category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/quiz/questions:
    get:
      operationId: listAdminQuizQuestions
      tags: [admin]
      summary: List quiz questions
      security:
        - bearerAuth: []
      parameters:
        - name: categoryId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of quiz questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizQuestion"
    post:
      operationId: createAdminQuizQuestion
      tags: [admin]
      summary: Create quiz question
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizQuestionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizQuestion"

  /admin/quiz/questions/{id}:
    put:
      operationId: updateAdminQuizQuestion
      tags: [admin]
      summary: Update quiz question
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizQuestionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizQuestion"
    delete:
      operationId: deleteAdminQuizQuestion
      tags: [admin]
      summary: Delete quiz question
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/exams:
    get:
      operationId: listAdminExams
      tags: [admin]
      summary: List exam editions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of exam editions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamEdition"
    post:
      operationId: createAdminExam
      tags: [admin]
      summary: Create exam edition
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamEditionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamEdition"

  /admin/exams/{id}:
    put:
      operationId: updateAdminExam
      tags: [admin]
      summary: Update exam edition
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamEditionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamEdition"
    delete:
      operationId: deleteAdminExam
      tags: [admin]
      summary: Delete exam edition
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/wotd:
    get:
      operationId: listAdminWotd
      tags: [admin]
      summary: List word of the day entries
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of WOTD entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WotdEntry"
    post:
      operationId: createAdminWotd
      tags: [admin]
      summary: Create WOTD entry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WotdEntryBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WotdEntry"

  /admin/wotd/{id}:
    put:
      operationId: updateAdminWotd
      tags: [admin]
      summary: Update WOTD entry
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WotdEntryBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WotdEntry"
    delete:
      operationId: deleteAdminWotd
      tags: [admin]
      summary: Delete WOTD entry
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /content/quiz:
    get:
      operationId: getContentQuiz
      tags: [content]
      summary: Get quiz categories with questions (public)
      responses:
        "200":
          description: Quiz categories with questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizCategory"

  /content/exams:
    get:
      operationId: getContentExams
      tags: [content]
      summary: Get exam editions (public)
      responses:
        "200":
          description: Exam editions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamEdition"

  /content/wotd:
    get:
      operationId: getContentWotd
      tags: [content]
      summary: Get active WOTD entries (public)
      responses:
        "200":
          description: WOTD entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WotdEntry"

  /admin/config:
    get:
      operationId: getAdminConfig
      tags: [admin]
      summary: Get AI config
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Config values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfig"
    put:
      operationId: updateAdminConfig
      tags: [admin]
      summary: Update AI config
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminConfig"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfig"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AdminLoginBody:
      type: object
      properties:
        password:
          type: string
      required:
        - password

    SecurityEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        description:
          type: string
        timestamp:
          type: string
      required:
        - id
        - type
        - description
        - timestamp

    RotatePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required:
        - currentPassword
        - newPassword

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
        ok:
          type: boolean
      required:
        - token
        - ok

    HourlyAiStat:
      type: object
      properties:
        hour:
          type: string
        feedback:
          type: number
        prompt:
          type: number
        wordOfDay:
          type: number
        total:
          type: number
      required:
        - hour
        - feedback
        - prompt
        - wordOfDay
        - total

    AdminStats:
      type: object
      properties:
        totalRequests:
          type: number
        aiCallsToday:
          type: number
        promptCallsToday:
          type: number
        wordOfDayCallsToday:
          type: number
        errorsToday:
          type: number
        uptimeSeconds:
          type: number
        startedAt:
          type: string
        requestsByEndpoint:
          type: object
          additionalProperties:
            type: number
        hourlyAiCalls:
          type: array
          items:
            $ref: "#/components/schemas/HourlyAiStat"
      required:
        - totalRequests
        - aiCallsToday
        - promptCallsToday
        - wordOfDayCallsToday
        - errorsToday
        - uptimeSeconds
        - startedAt
        - requestsByEndpoint
        - hourlyAiCalls

    RequestLog:
      type: object
      properties:
        id:
          type: string
        method:
          type: string
        path:
          type: string
        status:
          type: number
        durationMs:
          type: number
        timestamp:
          type: string
        isError:
          type: boolean
      required:
        - id
        - method
        - path
        - status
        - durationMs
        - timestamp
        - isError

    PracticePrompt:
      type: object
      properties:
        id:
          type: string
        taskType:
          type: string
        genre:
          type: string
        source:
          type: string
        prompt:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - taskType
        - genre
        - source
        - prompt
        - active
        - createdAt

    PracticePromptBody:
      type: object
      properties:
        taskType:
          type: string
        genre:
          type: string
        source:
          type: string
        prompt:
          type: string
        active:
          type: boolean
      required:
        - taskType
        - genre
        - source
        - prompt
        - active

    GrammarTopic:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
        explanation:
          type: string
        examples:
          type: array
          items:
            type: string
        tips:
          type: array
          items:
            type: string
        active:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - category
        - explanation
        - examples
        - tips
        - active
        - createdAt

    GrammarTopicBody:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        explanation:
          type: string
        examples:
          type: array
          items:
            type: string
        tips:
          type: array
          items:
            type: string
        active:
          type: boolean
      required:
        - title
        - category
        - explanation
        - examples
        - tips
        - active

    AdminConfig:
      type: object
      properties:
        feedbackSystemPrompt:
          type: string
        promptGenerationSystemPrompt:
          type: string
        adminPasswordHash:
          type: string
      required:
        - feedbackSystemPrompt
        - promptGenerationSystemPrompt

    QuizCategory:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        color:
          type: string
        icon:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - color
        - icon
        - active
        - createdAt

    QuizCategoryBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        color:
          type: string
        icon:
          type: string
        active:
          type: boolean
      required:
        - title
        - description
        - color
        - icon
        - active

    QuizQuestion:
      type: object
      properties:
        id:
          type: string
        categoryId:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correct:
          type: number
        explanation:
          type: string
        order:
          type: number
        createdAt:
          type: string
      required:
        - id
        - categoryId
        - question
        - options
        - correct
        - explanation
        - order
        - createdAt

    QuizQuestionBody:
      type: object
      properties:
        categoryId:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correct:
          type: number
        explanation:
          type: string
        order:
          type: number
      required:
        - categoryId
        - question
        - options
        - correct
        - explanation
        - order

    ExamTask:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        genre:
          type: string
        description:
          type: string
        linkUrl:
          type: string
        order:
          type: number
      required:
        - id
        - type
        - title
        - genre
        - description
        - order

    ExamEdition:
      type: object
      properties:
        id:
          type: string
        year:
          type: number
        edition:
          type: string
        title:
          type: string
        description:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/ExamTask"
        active:
          type: boolean
        order:
          type: number
        createdAt:
          type: string
      required:
        - id
        - year
        - edition
        - title
        - description
        - tasks
        - active
        - order
        - createdAt

    ExamEditionBody:
      type: object
      properties:
        year:
          type: number
        edition:
          type: string
        title:
          type: string
        description:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/ExamTask"
        active:
          type: boolean
        order:
          type: number
      required:
        - year
        - edition
        - title
        - description
        - tasks
        - active
        - order

    WotdEntry:
      type: object
      properties:
        id:
          type: string
        word:
          type: string
        pos:
          type: string
        definition:
          type: string
        example:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - word
        - pos
        - definition
        - example
        - active
        - createdAt

    WotdEntryBody:
      type: object
      properties:
        word:
          type: string
        pos:
          type: string
        definition:
          type: string
        example:
          type: string
        active:
          type: boolean
      required:
        - word
        - pos
        - definition
        - example
        - active
